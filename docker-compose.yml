services:
  db:
    image: pgvector/pgvector:pg17
    container_name: libcounterai-db
    environment:
      POSTGRES_DB: libcounterai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d libcounterai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lca

  redis:
    image: redis:7-alpine
    container_name: libcounterai-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lca

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: libcounterai-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=libcounterai
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-libcounterai-docker-secret-change-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-10}
      - UNKNOWN_IDENTITY_EXPIRE_HOURS=${UNKNOWN_IDENTITY_EXPIRE_HOURS:-24}
      - UNKNOWN_EXPIRED_GRACE_HOURS=${UNKNOWN_EXPIRED_GRACE_HOURS:-72}
      - AUDIT_LOG_ENABLED=${AUDIT_LOG_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lca

  frontend:
    build:
      context: ./surfaces/browser
      dockerfile: Dockerfile
    container_name: libcounterai-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./surfaces/browser:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - lca

volumes:
  postgres_data:
  redis_data:

networks:
  lca:
    name: libcounterai-net
